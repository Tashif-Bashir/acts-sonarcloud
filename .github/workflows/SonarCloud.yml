name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libboost-all-dev \
            ninja-build \
            cmake \
            unzip \
            curl

      - name: Install gcovr
        run: pip install gcovr==7.2

      - name: Install SonarCloud build wrapper
        run: |
          curl -L \
            https://sonarcloud.io/static/cpp/build-wrapper-linux-x86-64.zip \
            -o build-wrapper.zip
          unzip build-wrapper.zip
          sudo mv build-wrapper-linux-x86-64/build-wrapper-linux-x86-64 /usr/local/bin/
          rm -rf build-wrapper.zip build-wrapper-linux-x86-64
          build-wrapper-linux-x86-64 --version

      - name: Install sonar-scanner
        run: |
          SCANNER_VERSION=6.2.1.4610
          curl -L \
            "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux-x64.zip" \
            -o sonar-scanner.zip
          unzip sonar-scanner.zip
          sudo mv sonar-scanner-${SCANNER_VERSION}-linux-x64 /opt/sonar-scanner
          echo "/opt/sonar-scanner/bin" >> $GITHUB_PATH
          rm sonar-scanner.zip

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DACTS_USE_SYSTEM_BOOST=OFF \
            -DACTS_USE_SYSTEM_EIGEN3=OFF \
            -DACTS_BUILD_UNITTESTS=ON \
            -DACTS_BUILD_INTEGRATIONTESTS=OFF \
            -DACTS_BUILD_EXAMPLES=OFF \
            -DACTS_BUILD_EVERYTHING=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build with build-wrapper
        run: |
          build-wrapper-linux-x86-64 \
            --out-dir bw-output \
            cmake --build build --clean-first -j$(nproc)

      - name: Run unit tests
        run: |
          find ./build/bin -maxdepth 1 -name "*Test*" -executable \
            -exec '{}' ';' || true

      - name: Collect coverage into XML
        run: |
          gcovr \
            --sonarqube \
            --root . \
            --filter="Core/" \
            --output=coverage.xml \
            build/
          echo "Coverage file size: $(wc -c < coverage.xml) bytes"

      - name: Run sonar-scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            --define sonar.cfamily.compile-commands=bw-output/compile_commands.json \
            --define sonar.coverageReportPaths=coverage.xml \
            --define sonar.host.url=https://sonarcloud.io
