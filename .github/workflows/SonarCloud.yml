name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libboost-all-dev \
            ninja-build \
            cmake

      - name: Install gcovr
        run: pip install gcovr==7.2

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DACTS_USE_SYSTEM_BOOST=OFF \
            -DACTS_USE_SYSTEM_EIGEN3=OFF \
            -DACTS_BUILD_UNITTESTS=ON \
            -DACTS_BUILD_INTEGRATIONTESTS=OFF \
            -DACTS_BUILD_EXAMPLES=OFF \
            -DACTS_BUILD_EVERYTHING=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --clean-first -j$(nproc)

      - name: Run unit tests
        run: |
          find ./build/bin -maxdepth 1 -name "*Test*" -executable \
            -exec '{}' ';' || true

      - name: Collect coverage into XML
        run: |
          gcovr \
            --sonarqube \
            --root . \
            --filter="Core/" \
            --output=coverage.xml \
            build/
          echo "Coverage file size: $(wc -c < coverage.xml) bytes"

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.compile-commands=build/compile_commands.json
            --define sonar.coverageReportPaths=coverage.xml
            --define sonar.host.url=https://sonarcloud.io
